<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Body Explorer — Unitary Reference Principle</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000812;overflow:hidden;font-family:'Space Mono',monospace;color:#E0F4FF;}
canvas{display:block;position:fixed;inset:0;width:100%;height:100%;touch-action:none;}
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&display=swap');
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pls{0%,100%{opacity:1}50%{opacity:0.2}}
@keyframes spn{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes scanline{0%{top:-4px}100%{top:100%}}
.fade{animation:fadeUp 0.4s ease both;}
.pulse{animation:pls 2.8s ease infinite;}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;z-index:30;padding:.75rem 1.4rem;
  background:linear-gradient(180deg,rgba(0,8,18,.97) 0%,transparent 100%);
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;pointer-events:none;}
#hud>*{pointer-events:auto;}
#logo{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;
  background:linear-gradient(135deg,#00FFB3,#00D4FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 12px rgba(0,255,179,.6));}
#bc{display:flex;align-items:center;gap:.35rem;font-size:9px;letter-spacing:.15em;}
.bci{color:#0a1a24;cursor:default;transition:all .3s;}
.bci.active{color:#00D4FF;text-shadow:0 0 12px rgba(0,212,255,.8);}
.bci.past{color:#1a4455;cursor:pointer;} .bci.past:hover{color:#00D4FF;}
.bcs{color:#081418;}
#backbtn{background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.22);color:#00D4FF;
  font-size:9px;letter-spacing:.12em;padding:.4rem 1rem;cursor:pointer;
  font-family:'Space Mono',monospace;transition:all .2s;display:none;}
#backbtn:hover{background:rgba(0,212,255,.14);}

/* GROUP BAR */
#groupbar{position:fixed;top:58px;left:50%;transform:translateX(-50%);
  z-index:30;display:flex;gap:2px;pointer-events:auto;}
.gbtn{background:rgba(0,212,255,.04);border:1px solid rgba(0,212,255,.12);
  color:#1a4455;font-size:9px;letter-spacing:.12em;padding:.4rem .9rem;
  cursor:pointer;font-family:'Space Mono',monospace;transition:all .22s;white-space:nowrap;}
.gbtn:hover{color:#00D4FF;border-color:rgba(0,212,255,.32);}
.gbtn.on{background:rgba(0,212,255,.1);border-color:#00D4FF;color:#00D4FF;
  box-shadow:0 0 14px rgba(0,212,255,.22);}

/* PANEL */
#panel{position:fixed;bottom:0;left:0;width:min(350px,100vw);z-index:30;
  background:linear-gradient(0deg,rgba(0,8,18,.98) 0%,rgba(0,8,18,.86) 82%,transparent 100%);
  padding:2rem 1.4rem 1.4rem;pointer-events:auto;transition:opacity .4s ease;
  max-height:60vh;overflow-y:auto;}
#panel::-webkit-scrollbar{width:2px;}
#panel::-webkit-scrollbar-thumb{background:#0a1a24;}
.pt{font-size:9px;letter-spacing:.28em;color:#00D4FF;margin-bottom:.6rem;}
.ph{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#E0F4FF;margin-bottom:.8rem;line-height:1.1;}
.ub{border:1px solid rgba(0,212,255,.14);background:rgba(0,212,255,.05);padding:.9rem;margin-bottom:.9rem;}
.uv{font-family:'JetBrains Mono',monospace;font-size:26px;color:#00FFB3;font-weight:700;
  text-shadow:0 0 20px rgba(0,255,179,.5);}
input[type=range]{width:100%;accent-color:#00D4FF;height:3px;cursor:pointer;margin-bottom:.9rem;}
.sl{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px;}
.slb{font-size:9px;color:#1a4455;letter-spacing:.1em;}
.slv{font-family:'JetBrains Mono',monospace;font-size:22px;color:#00D4FF;font-weight:700;}
.ps{display:flex;gap:.4rem;margin-bottom:1rem;flex-wrap:wrap;}
.pb{background:rgba(0,212,255,.05);color:#00D4FF;border:1px solid rgba(0,212,255,.18);
  padding:.3rem .65rem;font-size:11px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-weight:700;transition:all .15s;}
.pb.on,.pb:hover{background:#00D4FF;color:#000812;}
.ht{font-size:9px;color:#1a4455;letter-spacing:.1em;}
.slist{display:flex;flex-direction:column;gap:2px;margin-bottom:.9rem;}
.srow{padding:.55rem .75rem;cursor:pointer;transition:all .15s;border:1px solid transparent;}
.srow:hover{border-color:rgba(255,255,255,.08);}
.sri{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.sn{font-size:10px;color:#8ab4c8;} .sp{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;}
.sbg{height:3px;background:rgba(224,244,255,.05);border-radius:1px;}
.sbf{height:100%;border-radius:1px;}
.ci{padding:.5rem .75rem;background:rgba(224,244,255,.02);border:1px solid rgba(224,244,255,.05);
  margin-bottom:2px;display:flex;justify-content:space-between;align-items:center;}
.cl{font-size:8px;color:#1a2a34;letter-spacing:.08em;}
.cv{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;}

/* URP side overlay */
#urp-ov{position:fixed;right:1.4rem;top:50%;transform:translateY(-50%);
  z-index:30;display:flex;flex-direction:column;gap:3px;pointer-events:none;}
.utag{background:rgba(0,8,18,.9);border:1px solid rgba(0,212,255,.2);
  padding:.45rem .8rem;font-family:'JetBrains Mono',monospace;font-size:11px;
  color:#00D4FF;letter-spacing:.08em;white-space:nowrap;}

/* Tooltip */
#tip{position:fixed;pointer-events:none;z-index:40;
  background:rgba(0,8,18,.94);border:1px solid rgba(0,212,255,.3);
  padding:.4rem .9rem;font-size:10px;color:#00D4FF;letter-spacing:.1em;
  display:none;white-space:nowrap;box-shadow:0 0 16px rgba(0,212,255,.2);}

/* Loading */
#loading{position:fixed;inset:0;background:#000812;display:flex;align-items:center;
  justify-content:center;z-index:100;flex-direction:column;gap:1.2rem;}
#lspn{width:44px;height:44px;border:2px solid rgba(0,212,255,.08);
  border-top-color:#00D4FF;border-radius:50%;animation:spn .8s linear infinite;}
#ltxt{font-family:'JetBrains Mono',monospace;font-size:12px;color:#00D4FF;letter-spacing:.25em;}
</style>
</head>
<body>
<div id="loading"><div id="lspn"></div><div id="ltxt">INITIALIZING</div></div>

<div style="position:fixed;top:0;right:1rem;z-index:100;padding:.5rem 0;">
  <a href="/" style="font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.15em;
    color:#00D4FF;text-decoration:none;border:1px solid rgba(0,212,255,.25);
    padding:.35rem .9rem;background:rgba(0,8,18,.9);">← BACK TO SITE</a>
</div>

<canvas id="c"></canvas>

<div id="hud">
  <div id="logo">n/R</div>
  <div id="bc">
    <span class="bci active" id="bc-crowd" data-l="crowd">CROWD</span><span class="bcs">›</span>
    <span class="bci" id="bc-body" data-l="body">BODY</span><span class="bcs">›</span>
    <span class="bci" id="bc-system" data-l="system">SYSTEM</span><span class="bcs">›</span>
    <span class="bci" id="bc-micro" data-l="micro">MICRO</span>
  </div>
  <button id="backbtn">← BACK</button>
</div>

<div id="groupbar">
  <button class="gbtn on" id="gb-all" onclick="setGroup('all')">ALL</button>
  <button class="gbtn" id="gb-gender" onclick="setGroup('gender')">BY GENDER</button>
  <button class="gbtn" id="gb-height" onclick="setGroup('height')">BY HEIGHT</button>
</div>

<div id="urp-ov"></div>
<div id="panel"></div>
<div id="tip"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─────────────────────────────────────────────────────────────────
//  DATA
// ─────────────────────────────────────────────────────────────────
const SYS=[
  {id:"skeleton",label:"Skeleton",col:0xE8D5B7,hex:"#E8D5B7",n:206,unit:"bones",icon:"🦴",
   desc:"206 bones — the structural declared whole.",
   subs:[{l:"Skull",n:22,c:"#F0E0C0"},{l:"Spine",n:33,c:"#DDD0A8"},{l:"Ribs",n:24,c:"#E8D5B7"},
         {l:"Arms",n:64,c:"#D4C090"},{l:"Legs",n:60,c:"#C8B880"},{l:"Other",n:3,c:"#BCA870"}]},
  {id:"muscles",label:"Muscles",col:0xFF6B6B,hex:"#FF6B6B",n:640,unit:"muscles",icon:"💪",
   desc:"~640 named skeletal muscles.",
   subs:[{l:"Head & Neck",n:68,c:"#FF9999"},{l:"Torso",n:112,c:"#FF8080"},{l:"Arms",n:72,c:"#FF6B6B"},
         {l:"Legs",n:200,c:"#FF5555"},{l:"Back",n:140,c:"#FF7070"},{l:"Other",n:48,c:"#FF9090"}]},
  {id:"organs",label:"Organs",col:0xFF6B9D,hex:"#FF6B9D",n:78,unit:"organs",icon:"❤️",
   desc:"78 organs keep you alive.",
   subs:[{l:"Brain",n:1,c:"#FFB3C6"},{l:"Heart",n:1,c:"#FF2255"},{l:"Lungs",n:2,c:"#FF85A1"},
         {l:"Liver",n:1,c:"#C97C5A"},{l:"Kidneys",n:2,c:"#A86B4A"},{l:"Other",n:71,c:"#CC7799"}]},
  {id:"cells",label:"Cells",col:0x00FFB3,hex:"#00FFB3",n:37200000000000,unit:"cells",icon:"🔬",
   desc:"37.2 trillion cells — each a declared whole.",
   subs:[{l:"Red Blood",n:25000000000000,c:"#FF3333"},{l:"Platelets",n:5000000000000,c:"#FFAA33"},
         {l:"White Blood",n:50000000000,c:"#DDDDFF"},{l:"Muscle",n:3000000000000,c:"#FF6B6B"},
         {l:"Fat",n:2400000000000,c:"#FFDD88"},{l:"Other",n:1750000000000,c:"#88FFCC"}]},
  {id:"dna",label:"DNA",col:0xC77DFF,hex:"#C77DFF",n:3200000000,unit:"base pairs",icon:"🧬",
   desc:"3.2 billion base pairs per cell.",
   subs:[{l:"Protein-coding",n:48000000,c:"#DD99FF"},{l:"Regulatory",n:640000000,c:"#BB77EE"},
         {l:"Repetitive",n:1120000000,c:"#9955CC"},{l:"Introns",n:1152000000,c:"#7733AA"},
         {l:"Non-coding",n:240000000,c:"#AA66DD"}]},
];
function fmt(n){if(n>=1e12)return(n/1e12).toFixed(1)+"T";if(n>=1e9)return(n/1e9).toFixed(1)+"B";if(n>=1e6)return(n/1e6).toFixed(1)+"M";if(n>=1e3)return(n/1e3).toFixed(0)+"K";return""+n;}

// ─────────────────────────────────────────────────────────────────
//  RNG + PERSON DATA
// ─────────────────────────────────────────────────────────────────
function rngF(seed){let s=(seed*1664525+1013904223)&0xffffffff;return function(){s=(s*1664525+1013904223)&0xffffffff;return(s>>>0)/0xffffffff;};}

function personData(idx){
  const r=rngF(idx*37+11);
  return{
    idx,
    female:(idx%2===0)||(r()>0.5),
    height:0.80+r()*0.32,
    build:0.72+r()*0.30,
    hue:Math.floor(r()*360),       // body hologram hue
    hairStyle:Math.floor(r()*3),
    walkSpeed:0.55+r()*0.9,
    walkPhase:r()*Math.PI*2,
  };
}

// ─────────────────────────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────────────────────────
const ST={level:"crowd",crowdSize:16,person:null,system:null,sub:null,group:"all"};

// ─────────────────────────────────────────────────────────────────
//  RENDERER
// ─────────────────────────────────────────────────────────────────
const canvas=document.getElementById("c");
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,powerPreference:"high-performance"});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setClearColor(0x000812,1);
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.1;

const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x000812,0.005);

const camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.05,600);
camera.position.set(0,14,38);
camera.lookAt(0,0,0);

window.addEventListener("resize",()=>{renderer.setSize(innerWidth,innerHeight);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();});
renderer.setSize(innerWidth,innerHeight);

// ─────────────────────────────────────────────────────────────────
//  LIGHTS  — cool blue medical key + accent lights
// ─────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x0a1a2a,3.0));
const kl=new THREE.DirectionalLight(0x88ccff,1.8);kl.position.set(8,24,14);kl.castShadow=true;scene.add(kl);
const kl2=new THREE.DirectionalLight(0x4488aa,1.0);kl2.position.set(-12,18,-10);scene.add(kl2);
const fl=new THREE.DirectionalLight(0x66aacc,0.7);fl.position.set(0,6,28);scene.add(fl);
const ol=new THREE.PointLight(0x22aaff,3.0,200);ol.position.set(0,40,0);scene.add(ol);
const cl=new THREE.PointLight(0x00ffcc,1.5,120);cl.position.set(0,6,18);scene.add(cl);

// ─────────────────────────────────────────────────────────────────
//  ENVIRONMENT
// ─────────────────────────────────────────────────────────────────
// Reflective dark floor
const flr=new THREE.Mesh(new THREE.PlaneGeometry(300,300),
  new THREE.MeshStandardMaterial({color:0x000d1a,roughness:0.12,metalness:0.9}));
flr.rotation.x=-Math.PI/2;flr.position.y=-3.15;flr.receiveShadow=true;scene.add(flr);
// Grid
const grd=new THREE.GridHelper(300,140,0x003355,0x001a2a);
grd.material.opacity=0.4;grd.material.transparent=true;grd.position.y=-3.12;scene.add(grd);
// Stars
(()=>{const g=new THREE.BufferGeometry();const n=5000,p=new Float32Array(n*3);for(let i=0;i<n*3;i++)p[i]=(Math.random()-.5)*600;g.setAttribute("position",new THREE.BufferAttribute(p,3));scene.add(new THREE.Points(g,new THREE.PointsMaterial({color:0x112233,size:.18,transparent:true,opacity:.55,blending:THREE.AdditiveBlending})));})();
// Ambient data particles
const ambG=new THREE.BufferGeometry();const aP=new Float32Array(700*3);for(let i=0;i<700;i++){const r=22+Math.random()*90,t=Math.random()*Math.PI*2,p=Math.random()*Math.PI;aP[i*3]=r*Math.sin(p)*Math.cos(t);aP[i*3+1]=r*Math.cos(p);aP[i*3+2]=r*Math.sin(p)*Math.sin(t);}
ambG.setAttribute("position",new THREE.BufferAttribute(aP,3));
const ambCloud=new THREE.Points(ambG,new THREE.PointsMaterial({color:0x0066aa,size:.14,transparent:true,opacity:.22,blending:THREE.AdditiveBlending}));
scene.add(ambCloud);

// ─────────────────────────────────────────────────────────────────
//  HOLOGRAM BODY BUILDER
//  Approach: translucent outer shell (LatheGeometry) +
//  glowing internal organ spheres + circuit/vein lines +
//  rim glow edges — exactly like the medical scan reference
// ─────────────────────────────────────────────────────────────────
//  HOLOGRAM PERSON — translucent shell + glowing organs
// ─────────────────────────────────────────────────────────────────

// Smooth lathe helper
function latheGeo(pts, segs) {
  return new THREE.LatheGeometry(
    pts.map(function(p){ return new THREE.Vector2(p[0], p[1]); }),
    segs || 28
  );
}

// Tube along spline points
function splineTube(pts3, r, segs) {
  var curve = new THREE.CatmullRomCurve3(pts3);
  return new THREE.TubeGeometry(curve, segs || 8, r, 7, false);
}

function buildAnatomicalPerson(pd, sel) {
  sel = sel || false;
  var g = new THREE.Group();

  // ── PER-PERSON COLOUR TINT ──────────────────────────────────────
  // Each person has a slightly different hologram hue so the crowd
  // reads as individuals, not a uniform mass.
  var rr = function(seed) {
    var s = (seed * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
  var tintSeed = pd.idx * 7 + 3;
  var hueShift  = rr(tintSeed) * 60 - 30; // -30..+30 degrees
  // Base hue: 195 (cyan-blue like medical scan)
  var baseHue  = ((195 + hueShift) + 360) % 360;
  // Convert to hex colour  (s=0.85, l=0.55 for shell; l=0.72 for bright)
  function hsl(h, s, l) {
    var c = (1 - Math.abs(2*l - 1)) * s;
    var x = c * (1 - Math.abs((h/60) % 2 - 1));
    var m = l - c/2, r=0, gg=0, b=0;
    if(h<60){r=c;gg=x;}else if(h<120){r=x;gg=c;}
    else if(h<180){gg=c;b=x;}else if(h<240){gg=x;b=c;}
    else if(h<300){r=x;b=c;}else{r=c;b=x;}
    return ((Math.round((r+m)*255)<<16)|(Math.round((gg+m)*255)<<8)|Math.round((b+m)*255));
  }
  var shellCol  = hsl(baseHue, 0.90, 0.52);
  var brightCol = hsl(baseHue, 1.00, 0.72);
  var innerCol  = hsl(baseHue, 0.80, 0.35);

  // Selected = pure green
  if (sel) { shellCol = 0x00FFB3; brightCol = 0x00FFD4; innerCol = 0x004422; }

  // ── MATERIALS ───────────────────────────────────────────────────
  // Outer shell — translucent like the medical scan image
  var shellMat = new THREE.MeshStandardMaterial({
    color: shellCol,
    emissive: shellCol,
    emissiveIntensity: 0.55,
    roughness: 0.15,
    metalness: 0.05,
    transparent: true,
    opacity: 0.22,
    side: THREE.DoubleSide,
    depthWrite: false,
  });
  // Inner bright — for edges/wireframe
  var edgeMat = new THREE.MeshBasicMaterial({
    color: brightCol,
    wireframe: true,
    transparent: true,
    opacity: 0.18,
  });
  // Solid bright lines on body surface  
  var rimMat = new THREE.MeshStandardMaterial({
    color: brightCol,
    emissive: brightCol,
    emissiveIntensity: 1.2,
    roughness: 0.1,
    metalness: 0.0,
    transparent: true,
    opacity: 0.85,
  });
  // Organ glow
  function organMat(col, op) {
    return new THREE.MeshBasicMaterial({
      color: col, transparent: true, opacity: op || 0.75,
      blending: THREE.AdditiveBlending
    });
  }

  var female = pd.female;
  var hs     = pd.height;
  var bs     = pd.build;

  // Helper: add translucent shell + wireframe overlay
  function addShell(geo, yOff, xOff, zOff, scaleX) {
    yOff = yOff || 0; xOff = xOff || 0; zOff = zOff || 0; scaleX = scaleX || 1;
    var m1 = new THREE.Mesh(geo, shellMat);
    m1.position.set(xOff, yOff, zOff);
    m1.scale.x = scaleX;
    m1.castShadow = false;
    g.add(m1);
    var m2 = new THREE.Mesh(geo, edgeMat);
    m2.position.set(xOff, yOff, zOff);
    m2.scale.x = scaleX;
    g.add(m2);
    return m1;
  }

  // Helper: add a bright rim/edge line  
  function addRim(geo, yOff, xOff, zOff) {
    yOff=yOff||0; xOff=xOff||0; zOff=zOff||0;
    var m = new THREE.Mesh(geo, rimMat);
    m.position.set(xOff, yOff, zOff);
    g.add(m);
  }

  // ── HEAD ─────────────────────────────────────────────────────────
  var HW = female ? 0.36 : 0.40;
  var HH = female ? 0.45 : 0.50;
  var HY = 3.55;
  var headGeo = new THREE.SphereGeometry(HW, 24, 18);
  addShell(headGeo, HY);
  // Skull rim line at equator
  addRim(new THREE.TorusGeometry(HW * 0.98, 0.012, 6, 32), HY, 0, 0);
  // Crown line
  addRim(new THREE.TorusGeometry(HW * 0.65, 0.010, 6, 24), HY + HH * 0.35, 0, 0);

  // Face features — subtle bright dots
  // Eyes
  [-1, 1].forEach(function(s) {
    var eye = new THREE.Mesh(
      new THREE.SphereGeometry(0.048, 8, 8),
      organMat(0xAADDFF, 0.90)
    );
    eye.position.set(s * HW * 0.48, HY + 0.05, HW * 0.82);
    g.add(eye);
    // Eye glow
    var eyeGlow = new THREE.Mesh(
      new THREE.SphereGeometry(0.09, 6, 6),
      organMat(brightCol, 0.20)
    );
    eyeGlow.position.copy(eye.position);
    g.add(eyeGlow);
  });

  // ── NECK ─────────────────────────────────────────────────────────
  var NR = female ? 0.125 : 0.158;
  var NY = HY - HH - 0.04;
  var neckGeo = latheGeo([
    [NR * 0.88, NY + 0.28],
    [NR,        NY + 0.14],
    [NR * 1.05, NY + 0.00],
    [NR * 1.15, NY - 0.10],
  ], 20);
  addShell(neckGeo, 0);
  // Neck rim ring
  addRim(new THREE.TorusGeometry(NR * 1.05, 0.010, 6, 24), NY, 0, 0);

  // ── TORSO ────────────────────────────────────────────────────────
  var TY = NY - 0.10;

  if (female) {
    var sw=0.50*bs, bw=0.39*bs, ww=0.285*bs, hw=0.48*bs;
    var tProf = [
      [sw*0.50, TY      ], [sw*0.84, TY-0.12],
      [sw,      TY-0.32 ], [sw*0.95, TY-0.52],
      [bw*1.01, TY-0.78 ], [bw,      TY-0.94],
      [ww*1.03, TY-1.10 ], [ww,      TY-1.28],
      [ww*1.06, TY-1.44 ], [hw*0.88, TY-1.64],
      [hw,      TY-1.80 ], [hw*0.94, TY-1.96],
      [hw*0.78, TY-2.10 ],
    ];
    addShell(latheGeo(tProf, 28), 0);
    addShell(latheGeo(tProf, 28), 0); // double for opacity
    // Horizontal rim lines at key silhouette points
    [
      [sw,  TY-0.32], [ww, TY-1.28], [hw, TY-1.80]
    ].forEach(function(p) {
      addRim(new THREE.TorusGeometry(p[0]*0.98, 0.011, 6, 28), p[1]);
    });
    // Bust surface rims
    [-1,1].forEach(function(s) {
      var bustRim = new THREE.Mesh(

    // Ankle
    addShell(new THREE.SphereGeometry(caW*0.74, 10, 8), hipY-2.12, s*lSep*(female?0.84:0.91), 0.04);

    var fPts = [
      new THREE.Vector3(s*lSep*(female?0.84:0.91)-s*0.07, hipY-2.16, 0.03),

  // ── SELECTION EFFECTS ─────────────────────────────────────────
  if (sel) {

  var proxy = new THREE.Mesh(

  g.scale.setScalar(hs * 0.82);

//  GROUPS / WALK
// ─────────────────────────────────────────────────────────────────
let G={};
const clickables=[];
let personMeshes=[];
let allPDs=[];

function clearAll(){
  Object.keys(G).forEach(function(k){
    if(!G[k])return;
    G[k].traverse(function(c){if(!c.isMesh&&!c.isLine)return;
      if(c.geometry)c.geometry.dispose();
      (Array.isArray(c.material)?c.material:[c.material]).forEach(function(m){if(m)m.dispose();});});
    scene.remove(G[k]);G[k]=null;});
  clickables.length=0;personMeshes=[];
}

function getTargets(pds,mode){
  const n=pds.length,pos=[];
  if(mode==="all"){
    const cols=Math.ceil(Math.sqrt(n)*1.5),spX=4.4,spZ=5.6,W=(cols-1)*spX;
    pds.forEach(function(_,i){
      const col=i%cols,row=Math.floor(i/cols);
      pos[i]={x:col*spX-W/2+(row%2?spX*.5:0),z:row*spZ-(Math.ceil(n/cols)-1)*spZ/2};});
  } else if(mode==="gender"){
    const fem=pds.filter(function(p){return p.female;}),mal=pds.filter(function(p){return!p.female;});
    const spX=4.2,spZ=5.4;
    function grid(arr,baseX){
      const cols=Math.ceil(Math.sqrt(arr.length)*1.4),W=(cols-1)*spX;
      arr.forEach(function(p,i){
        const col=i%cols,row=Math.floor(i/cols);
        pos[p.idx]={x:baseX+col*spX-W/2+(row%2?spX*.5:0),z:row*spZ-(Math.ceil(arr.length/cols)-1)*spZ/2};});
    }
    grid(fem,-14);grid(mal,14);
  } else if(mode==="height"){
    const sorted=[].concat(pds).sort(function(a,b){return b.height-a.height;});
    const cols=Math.ceil(Math.sqrt(n)*1.5),spX=4.4,spZ=5.6,W=(cols-1)*spX;
    sorted.forEach(function(p,i){
      const col=i%cols,row=Math.floor(i/cols);
      pos[p.idx]={x:col*spX-W/2+(row%2?spX*.5:0),z:row*spZ-(Math.ceil(n/cols)-1)*spZ/2};});
  }
  return pos;
}

function buildCrowd(){
  clearAll();
  const g=new THREE.Group();G.crowd=g;scene.add(g);
  allPDs=Array.from({length:ST.crowdSize},function(_,i){return personData(i);});
  const tgts=getTargets(allPDs,ST.group);
  allPDs.forEach(function(pd){
    const sel=(ST.person===pd.idx);
    const p=buildAnatomicalPerson(pd,sel);
    const sx=(Math.random()-.5)*70,sz=(Math.random()-.5)*70;
    p.position.set(sx,-3.15,sz);
    const tp=tgts[pd.idx]||{x:0,z:0};
    const dx=tp.x-sx,dz=tp.z-sz;
    p.rotation.y=Math.atan2(dx,dz);
    g.add(p);
    const prx=p.children.find(function(c){return c.userData.type==="person";});
    if(prx)clickables.push(prx);
    personMeshes.push({grp:p,pd,tx:tp.x,tz:tp.z,cx:sx,cz:sz,arrived:false,walkT:0});
  });
  camTo({x:0,y:16,z:42+ST.crowdSize*.32},{x:0,y:0,z:0},1400);
  updateURPOv();
}

function walkToNew(){
  const tgts=getTargets(allPDs,ST.group);
  personMeshes.forEach(function(pm){
    const tp=tgts[pm.pd.idx]||{x:0,z:0};
    pm.tx=tp.x;pm.tz=tp.z;pm.arrived=false;pm.walkT=0;
    const dx=tp.x-pm.cx,dz=tp.z-pm.cz;
    if(Math.abs(dx)+Math.abs(dz)>.1)pm.grp.rotation.y=Math.atan2(dx,dz);
  });
}

function buildBody(pd){
  clearAll();
  const g=new THREE.Group();G.body=g;scene.add(g);
  const bigP=buildAnatomicalPerson(Object.assign({},pd,{height:1.18,build:pd.build*1.08}),false);

  // Orbit particle cloud
  const og=new THREE.BufferGeometry();const op=new Float32Array(500*3);
  for(let i=0;i<500;i++){const r=6+Math.random()*6,t=Math.random()*Math.PI*2,p=Math.random()*Math.PI;
    op[i*3]=r*Math.sin(p)*Math.cos(t);op[i*3+1]=r*Math.cos(p)*.5+1;op[i*3+2]=r*Math.sin(p)*Math.sin(t);}
  og.setAttribute("position",new THREE.BufferAttribute(op,3));
  g.add(new THREE.Points(og,new THREE.PointsMaterial({color:0x0088ff,size:.07,transparent:true,opacity:.28,blending:THREE.AdditiveBlending})));

  // System orbs
  SYS.forEach(function(sys,i){
    const ang=(i/SYS.length)*Math.PI*2,dist=9.5;
    const og2=new THREE.Group();og2.position.set(Math.cos(ang)*dist,(i%2?2.2:-.6),Math.sin(ang)*dist);
    const om=new THREE.Mesh(new THREE.SphereGeometry(.70,28,28),
      new THREE.MeshStandardMaterial({color:sys.col,emissive:sys.col,emissiveIntensity:.80,roughness:.12,metalness:.82}));
    om.userData={type:"system",system:sys,label:sys.label};og2.add(om);clickables.push(om);
    [.92,1.22].forEach(function(r,ri){
      const ring=new THREE.Mesh(new THREE.TorusGeometry(r,.042,8,56),
        new THREE.MeshBasicMaterial({color:sys.col,transparent:true,opacity:.55-ri*.15,blending:THREE.AdditiveBlending}));
      ring.rotation.x=ri*.9+.4;ring.rotation.z=ri*.5;og2.add(ring);
    });
    og2.add(new THREE.Mesh(new THREE.SphereGeometry(1.3,10,10),
      new THREE.MeshBasicMaterial({color:sys.col,transparent:true,opacity:.07,blending:THREE.AdditiveBlending})));
    g.add(og2);
  });

  const scanM=new THREE.MeshBasicMaterial({color:0x00D4FF,transparent:true,opacity:.18,side:THREE.DoubleSide,blending:THREE.AdditiveBlending});
  const scan=new THREE.Mesh(new THREE.CylinderGeometry(1.9,1.9,.07,64,1,true),scanM);
  scan.userData.scan=true;g.add(scan);
  camTo({x:0,y:5,z:23},{x:0,y:2,z:0},1000);
}

function buildSystem(sys){
  clearAll();const g=new THREE.Group();G.system=g;scene.add(g);const col=sys.col;
  g.add(new THREE.Mesh(new THREE.SphereGeometry(1.65,56,56),new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:.65,roughness:.14,metalness:.86,transparent:true,opacity:.9})));
  g.add(new THREE.Mesh(new THREE.SphereGeometry(1.65,28,28),new THREE.MeshBasicMaterial({color:col,wireframe:true,transparent:true,opacity:.09})));
  g.add(new THREE.Mesh(new THREE.SphereGeometry(.72,14,14),new THREE.MeshBasicMaterial({color:0xFFFFFF,transparent:true,opacity:.20,blending:THREE.AdditiveBlending})));
  g.add(new THREE.Mesh(new THREE.TorusGeometry(2.25,.052,8,80),new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.24,blending:THREE.AdditiveBlending})));
  sys.subs.forEach(function(sub,i){
    const pct=sub.n/sys.n,ang=(i/sys.subs.length)*Math.PI*2,dist=5+pct*10,sz=Math.min(.48+pct*3.5,1.85);
    const sc=parseInt(sub.c.replace("#",""),16);
    const og=new THREE.Group();og.position.set(Math.cos(ang)*dist,Math.sin(i*1.2)*2.2,Math.sin(ang)*dist);
    const om=new THREE.Mesh(new THREE.SphereGeometry(sz,24,24),new THREE.MeshStandardMaterial({color:sc,emissive:sc,emissiveIntensity:.62,roughness:.18,metalness:.78}));
    om.userData={type:"sub",sub:sub,system:sys,label:sub.l};og.add(om);clickables.push(om);
    og.add(new THREE.Mesh(new THREE.SphereGeometry(sz*2,8,8),new THREE.MeshBasicMaterial({color:sc,transparent:true,opacity:.07,blending:THREE.AdditiveBlending})));

function addDNA(parent,radius,turns){
  radius=radius||3;turns=turns||70;
  const pts1=[],pts2=[];
  for(let i=0;i<turns;i++){const a=i*.22,y=i*.2-turns*.1;pts1.push(new THREE.Vector3(Math.cos(a)*radius,y,Math.sin(a)*radius));pts2.push(new THREE.Vector3(Math.cos(a+Math.PI)*radius,y,Math.sin(a+Math.PI)*radius));}
  [pts1,pts2].forEach(function(pts,ci){
    const geo=new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts),turns*3,.065,8,false);
    parent.add(new THREE.Mesh(geo,new THREE.MeshStandardMaterial({color:ci?0xDD99FF:0xC77DFF,emissive:ci?0xDD99FF:0xC77DFF,emissiveIntensity:.62,roughness:.2,metalness:.72,transparent:true,opacity:.82})));
  });
  for(let i=0;i<turns;i+=4){
    const p1=pts1[i],p2=pts2[i],mid=p1.clone().add(p2).multiplyScalar(.5),len=p1.distanceTo(p2);
    const rg=new THREE.Mesh(new THREE.CylinderGeometry(.045,.045,len,6),new THREE.MeshBasicMaterial({color:0xFFFFFF,transparent:true,opacity:.30,blending:THREE.AdditiveBlending}));
    rg.position.copy(mid);rg.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),p2.clone().sub(p1).normalize());parent.add(rg);
  }
}

function camTo(tp,la,dur){
  const sp={x:camera.position.x,y:camera.position.y,z:camera.position.z};
  const t0=performance.now();
  (function tick(){const t=Math.min((performance.now()-t0)/dur,1);const e=t<.5?4*t*t*t:(t-1)*(2*t-2)*(2*t-2)+1;
    camera.position.set(sp.x+(tp.x-sp.x)*e,sp.y+(tp.y-sp.y)*e,sp.z+(tp.z-sp.z)*e);
    camera.lookAt(la.x,la.y,la.z);if(t<1)requestAnimationFrame(tick);})();
}

const raycaster=new THREE.Raycaster(),mouse=new THREE.Vector2();
const tip=document.getElementById("tip");
function checkHover(){
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(clickables,false);
  if(hits.length){
    const ud=hits[0].object.userData;tip.style.display="block";
    const r=canvas.getBoundingClientRect();
    tip.style.left=Math.min(((mouse.x+1)/2)*r.width+16,r.width-200)+"px";
    tip.style.top=Math.max(((1-mouse.y)/2)*r.height-20,10)+"px";
    tip.textContent=ud.label||"";canvas.style.cursor="pointer";
  }else{tip.style.display="none";canvas.style.cursor="default";}
}
function handleClick(){
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(clickables,false);
  if(!hits.length)return;
  const ud=hits[0].object.userData;
  if(ud.type==="person"){ST.person=ud.index;goTo("body");}
  else if(ud.type==="system"){ST.system=ud.system;goTo("system");}
  else if(ud.type==="sub"){ST.sub=ud.sub;goTo("micro");}
}

  mouse.x=((t.clientX-r.left)/r.width)*2-1;mouse.y=-((t.clientY-r.top)/r.height)*2+1;
  handleClick();
},{passive:false});

// ─────────────────────────────────────────────────────────────────
//  WALK SYSTEM
// ─────────────────────────────────────────────────────────────────
const WALK_SPD=3.2,ARRIVE=.18;
function updateWalk(dt){
  if(ST.level!=="crowd")return;
  personMeshes.forEach(function(pm){
    if(pm.arrived)return;
    const dx=pm.tx-pm.cx,dz=pm.tz-pm.cz,dist=Math.sqrt(dx*dx+dz*dz);
    if(dist<ARRIVE){pm.cx=pm.tx;pm.cz=pm.tz;pm.arrived=true;pm.grp.position.x=pm.tx;pm.grp.position.z=pm.tz;pm.grp.rotation.y=0;return;}
    const spd=Math.min(dist,WALK_SPD*pm.pd.walkSpeed*dt);
    pm.cx+=dx/dist*spd;pm.cz+=dz/dist*spd;
    pm.grp.position.x=pm.cx;pm.grp.position.z=pm.cz;
    pm.grp.rotation.y=Math.atan2(dx,dz);
    pm.walkT+=dt*pm.pd.walkSpeed*2.5;
  });
}

// ─────────────────────────────────────────────────────────────────
//  MAIN LOOP
// ─────────────────────────────────────────────────────────────────
let clock=0,lastT=performance.now();
function animate(){
  requestAnimationFrame(animate);
  const now=performance.now(),dt=Math.min((now-lastT)/1000,.05);lastT=now;clock+=dt;

  // Orbit camera
  if(!isDrag)sph.theta+=.0008;
  const cy=sph.r*Math.cos(sph.phi),cxz=sph.r*Math.sin(sph.phi);
  camera.position.x+=(Math.cos(sph.theta)*cxz-camera.position.x)*.05;
  camera.position.z+=(Math.sin(sph.theta)*cxz-camera.position.z)*.05;
  camera.position.y+=(cy-camera.position.y)*.05;
  camera.lookAt(0,ST.level==="body"?2:0,0);

  ambCloud.rotation.y=clock*.015;

  updateWalk(dt);

  if(ST.level==="crowd"){
    personMeshes.forEach(function(pm,pi){
      const walking=!pm.arrived;
      const wt=pm.walkT;

      // Leg walk animation
      pm.grp.children.forEach(function(c){
        if(!c.userData.isLeg)return;
        const s=c.userData.legSide,part=c.userData.legPart;
        const phase=s>0?0:Math.PI;
        if(part==="upper")c.rotation.x=Math.sin(wt+phase)*(walking?.40:0);
        if(part==="lower")c.rotation.x=Math.max(0,Math.sin(wt+phase+.6)*.32)*(walking?1:0);
      });

      // Breathing when idle
      if(pm.arrived){const bs=1+Math.sin(clock*1.4+pi*.5)*.012;pm.grp.scale.y=pm.pd.height*.80*bs;}

      // Scan ring ripple effect
      pm.grp.children.forEach(function(c){
        if(c.userData.isScanRing){
          c.material.opacity=.08+Math.sin(clock*1.8+pi*.3+c.userData.ringIdx*.8)*.12;
        }
        if(c.userData.isPulse){
          const ps=(clock*.6+pi*.4)%1;
          c.scale.setScalar(.5+ps*1.2);
          c.material.opacity=.18*(1-ps);
        }
        // Heart beat
        if(c.userData.isHeart){const hb=1+Math.abs(Math.sin(clock*3.5+pi*.28))*.28;c.scale.setScalar(hb);}
        if(c.userData.isHeartGlow){c.material.opacity=.08+Math.abs(Math.sin(clock*3.5+pi*.28))*.16;}
        if(c.userData.isHeartRing){c.scale.setScalar(1+Math.abs(Math.sin(clock*3.5+pi*.28))*.35);c.material.opacity=.3*(1-Math.abs(Math.sin(clock*3.5+pi*.28)));}
        // Lung breathe
        if(c.userData.isLung){const lb=1+Math.sin(clock*1.2+pi*.22)*.10;c.scale.set(.68*lb,lb,.62*lb);}
      });
    });
  }

  // Body scan line
  if(G.body){
    G.body.children.forEach(function(c){
      if(c.userData.scan){c.position.y=((clock*.45)%1)*9-4;c.material.opacity=.15+Math.sin(clock*2)*.06;}
    });
    G.body.rotation.y=Math.sin(clock*.1)*.06;
    // Orb pulse
    clickables.forEach(function(m,ci){
      if(m.userData.type==="system"&&m.material){m.material.emissiveIntensity=.68+Math.sin(clock*2+ci*.7)*.24;m.scale.setScalar(1+Math.sin(clock*2.2+ci*.9)*.04);}
    });
  }

  // System / micro orbit
  if(G.system&&ST.level==="system"){G.system.rotation.y+=.0038;clickables.forEach(function(m,ci){if(m.userData.type==="sub"&&m.material)m.material.emissiveIntensity=.58+Math.sin(clock*1.8+ci*.8)*.26;});}
  if(G.system&&ST.level==="micro"){G.system.rotation.y+=.004;G.system.children.forEach(function(c){if(c.userData.autoRing){c.rotation.x+=c.userData.rs.x;c.rotation.y+=c.userData.rs.y;}});}

  renderer.render(scene,camera);
}

// ─────────────────────────────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────────────────────────────
buildCrowd();updateBC();updatePanel();animate();
setTimeout(function(){const l=document.getElementById("loading");l.style.transition="opacity .7s";l.style.opacity="0";setTimeout(function(){l.remove();},700);},1000);
</script>
